name: 🐳 publish-to-ghcr

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      komari_version:
        description: "Base ghcr.io/komari-monitor/komari tag; empty means latest"
        required: false
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🧭 Set image metadata
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "KOMARI_VERSION=${{ github.event.inputs.komari_version || 'latest' }}" >> "$GITHUB_ENV"

      - name: 🏷️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            KOMARI_VERSION=${{ env.KOMARI_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
